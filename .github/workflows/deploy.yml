name: CD - Build and Deploy

on:
  workflow_dispatch:
    inputs:
      rollback_image_tag:
        description: "Optional full SHA tag of an existing GHCR image to deploy instead of rebuilding main"
        required: false
        type: string
  workflow_run:
    workflows:
      - CI - Code Quality
    types:
      - completed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    if: >
      (
        github.event_name == 'workflow_dispatch' &&
        github.ref == 'refs/heads/main'
      ) || (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
      GHCR_DEPLOY_USERNAME: ${{ secrets.GHCR_DEPLOY_USERNAME }}
      GHCR_DEPLOY_TOKEN: ${{ secrets.GHCR_DEPLOY_TOKEN }}
      RUN_SEED_ON_DEPLOY: ${{ secrets.RUN_SEED_ON_DEPLOY }}

    steps:
      - name: Checkout target commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

      - name: Validate required deploy secrets and runner-side production config contracts
        run: |
          set -eu
          for var in DEPLOY_HOST DEPLOY_USER DEPLOY_KNOWN_HOSTS PROD_ENV_FILE; do
            if [ -z "${!var}" ]; then
              echo "Missing required secret: $var" >&2
              exit 1
            fi
          done
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "Missing required secret: DEPLOY_SSH_KEY" >&2
            exit 1
          fi
          if [ ! -f "$GITHUB_WORKSPACE/docker-compose.prod.yml" ]; then
            echo "Missing required workflow artifact: docker-compose.prod.yml" >&2
            exit 1
          fi
          if [ ! -d "$GITHUB_WORKSPACE/observability" ]; then
            echo "Missing required workflow artifact: observability/" >&2
            exit 1
          fi
          if { [ -n "${GHCR_DEPLOY_USERNAME:-}" ] && [ -z "${GHCR_DEPLOY_TOKEN:-}" ]; } || \
             { [ -z "${GHCR_DEPLOY_USERNAME:-}" ] && [ -n "${GHCR_DEPLOY_TOKEN:-}" ]; }; then
            echo "GHCR_DEPLOY_USERNAME and GHCR_DEPLOY_TOKEN must be provided together." >&2
            exit 1
          fi
          validation_env_path="$RUNNER_TEMP/prod.env.validation"
          workspace_env_path="$GITHUB_WORKSPACE/.env"
          workspace_env_backup_path="$RUNNER_TEMP/workspace.env.backup"
          workspace_env_backup_exists=0

          cleanup_validation_files() {
            rm -f "$validation_env_path"
            rm -f "$workspace_env_path"
            if [ "$workspace_env_backup_exists" -eq 1 ]; then
              mv "$workspace_env_backup_path" "$workspace_env_path"
            fi
          }
          trap cleanup_validation_files EXIT

          if [ -f "$workspace_env_path" ]; then
            cp "$workspace_env_path" "$workspace_env_backup_path"
            workspace_env_backup_exists=1
          fi

          printf '%s\n' "$PROD_ENV_FILE" > "$validation_env_path"
          cp "$validation_env_path" "$workspace_env_path"

          python "$GITHUB_WORKSPACE/scripts/ci/validate_deploy_env.py" "$validation_env_path"

          validation_image_repo="ghcr.io/${GITHUB_REPOSITORY}"
          validation_image_repo="$(printf '%s' "$validation_image_repo" | tr '[:upper:]' '[:lower:]')"
          APP_IMAGE="${validation_image_repo}:validation" \
          docker compose \
            --env-file "$validation_env_path" \
            -f docker-compose.prod.yml \
            config --quiet

      - name: Resolve deploy mode and prepare deployment metadata
        id: prep
        env:
          ROLLBACK_IMAGE_TAG_INPUT: ${{ github.event.inputs.rollback_image_tag || '' }}
        run: |
          set -eu
          image_repo="ghcr.io/${GITHUB_REPOSITORY}"
          image_repo="$(printf '%s' "$image_repo" | tr '[:upper:]' '[:lower:]')"
          deploy_port="${DEPLOY_PORT:-22}"
          deploy_path="${DEPLOY_PATH:-/home/ilya/pybot}"
          deploy_mode_json="$RUNNER_TEMP/deploy-mode.json"
          python "$GITHUB_WORKSPACE/scripts/ci/resolve_deploy_mode.py" \
            --current-sha "$(git rev-parse HEAD)" \
            --rollback-image-tag "${ROLLBACK_IMAGE_TAG_INPUT:-}" > "$deploy_mode_json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          deploy_mode = json.loads(Path(os.environ["RUNNER_TEMP"], "deploy-mode.json").read_text(encoding="utf-8"))
          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as fh:
              fh.write(f"image_tag={deploy_mode['image_tag']}\n")
              fh.write(f"rollback_mode={str(deploy_mode['rollback_mode']).lower()}\n")
              fh.write(f"run_migrations={str(deploy_mode['run_migrations']).lower()}\n")
          PY
          {
            echo "image_repo=$image_repo"
            echo "deploy_port=$deploy_port"
            echo "deploy_path=$deploy_path"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR for deploy workflow
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Rollback image compatibility warning
        if: steps.prep.outputs.rollback_mode == 'true'
        run: |
          echo "::warning title=Rollback deploy::Image rollback does not revert database migrations. Use this only when the selected image is compatible with the current database schema, or follow the documented database recovery procedure separately."

      - name: Build and push production image
        if: steps.prep.outputs.rollback_mode != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.prep.outputs.image_repo }}:${{ steps.prep.outputs.image_tag }}
            ${{ steps.prep.outputs.image_repo }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify rollback image exists in GHCR
        if: steps.prep.outputs.rollback_mode == 'true'
        run: |
          set -eu
          docker buildx imagetools inspect \
            "${{ steps.prep.outputs.image_repo }}:${{ steps.prep.outputs.image_tag }}" > /dev/null

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Ansible
        run: python -m pip install --upgrade pip ansible-core

      - name: Prepare SSH
        run: |
          set -eu
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Prepare deploy inventory and vars
        env:
          ROLLBACK_MODE: ${{ steps.prep.outputs.rollback_mode }}
          RUN_MIGRATIONS: ${{ steps.prep.outputs.run_migrations }}
        run: |
          set -eu
          printf '%s\n' "$PROD_ENV_FILE" > "$RUNNER_TEMP/prod.env"
          cat > "$RUNNER_TEMP/inventory.ini" <<EOF
          [pybot]
          production ansible_host=${DEPLOY_HOST} ansible_user=${DEPLOY_USER} ansible_port=${{ steps.prep.outputs.deploy_port }} ansible_ssh_private_key_file=${HOME}/.ssh/id_ed25519
          EOF
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "deploy_path": os.environ["DEPLOY_PATH"] or "${{ steps.prep.outputs.deploy_path }}",
              "deploy_compose_src": str(Path(os.environ["GITHUB_WORKSPACE"]) / "docker-compose.prod.yml"),
              "observability_src": str(Path(os.environ["GITHUB_WORKSPACE"]) / "observability"),
              "app_env_src": str(Path(os.environ["RUNNER_TEMP"]) / "prod.env"),
              "image_repository": "${{ steps.prep.outputs.image_repo }}",
              "image_tag": "${{ steps.prep.outputs.image_tag }}",
              "rollback_mode": os.environ["ROLLBACK_MODE"].lower() == "true",
              "run_migrations": os.environ["RUN_MIGRATIONS"].lower() == "true",
              "registry_username": os.environ.get("GHCR_DEPLOY_USERNAME", ""),
              "registry_token": os.environ.get("GHCR_DEPLOY_TOKEN", ""),
              "run_seed_on_deploy": os.environ.get("RUN_SEED_ON_DEPLOY", ""),
          }
          Path(os.environ["RUNNER_TEMP"], "deploy-vars.json").write_text(
              json.dumps(payload),
              encoding="utf-8",
          )
          PY

      - name: Debug SSH connectivity
        run: |
          set -eu
          echo "Host: $DEPLOY_HOST"
          echo "Port: ${DEPLOY_PORT:-22}"
          echo "User: $DEPLOY_USER"
          getent hosts "$DEPLOY_HOST" || true
          python - <<'PY'
          import os
          import socket

          host = os.environ["DEPLOY_HOST"]
          port = int(os.environ.get("DEPLOY_PORT") or "22")

          print(f"Resolving {host}:{port}")
          infos = socket.getaddrinfo(host, port, type=socket.SOCK_STREAM)
          for info in infos:
              print("Resolved:", info[4])

          try:
              with socket.create_connection((host, port), timeout=10):
                  print("TCP open")
          except OSError as err:
              print(f"TCP connect failed: {err}")
              raise
          PY
          ssh -vv -o BatchMode=yes -o ConnectTimeout=10 -o StrictHostKeyChecking=yes \
            -i "$HOME/.ssh/id_ed25519" \
            -p "${DEPLOY_PORT:-22}" \
            "$DEPLOY_USER@$DEPLOY_HOST" true

      - name: Run production deploy
        run: |
          set -eu
          ansible-playbook ansible/playbooks/deploy.yml \
            -i "$RUNNER_TEMP/inventory.ini" \
            --extra-vars "@$RUNNER_TEMP/deploy-vars.json"
