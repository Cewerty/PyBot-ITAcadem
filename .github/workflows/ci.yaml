name: CI - Code Quality

on:
  push:
    branches: [ main, dev-Ilya ]
  pull_request:
    branches: [ main, dev-Ilya ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker-build-and-compose-validation:
    name: Docker Build & Compose Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare CI .env for compose validation
        run: |
          cat > .env <<'EOF'
          APP_IMAGE=ghcr.io/example/pybot:test
          POSTGRES_DB=pybot_ci
          POSTGRES_USER=pybot
          POSTGRES_PASSWORD=ci-compose-password
          POSTGRES_PORT=5432
          DATABASE_URL=postgresql+asyncpg://pybot:ci-compose-password@postgres:5432/pybot_ci
          GRAFANA_ADMIN_PASSWORD=dummy
          TASKIQ_WORKERS=1
          EOF

      - name: Build Docker image
        run: docker build -f Dockerfile .

      - name: Validate development compose config
        run: docker compose -f docker-compose.yml config > /dev/null

      - name: Validate production compose config
        run: docker compose -f docker-compose.prod.yml config > /dev/null

      - name: Verify Loki production config with pinned image
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE/observability/loki/local-config.yaml:/etc/loki/config.yaml:ro" \
            grafana/loki:3.5.0 \
            -config.file=/etc/loki/config.yaml \
            -verify-config=true

  local-parity-smoke-check:
    name: Local Dev/Prod Parity Smoke Check
    runs-on: ubuntu-latest
    needs: docker-build-and-compose-validation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare CI .env for local parity smoke-check
        run: |
          cat > .env <<'EOF'
          BOT_TOKEN=123456:ci-prod-token
          BOT_TOKEN_TEST=654321:ci-test-token
          BOT_MODE=test
          ROLE_REQUEST_ADMIN_TG_ID=1
          POSTGRES_DB=pybot_parity
          POSTGRES_USER=pybot
          POSTGRES_PASSWORD=ci-parity-password
          POSTGRES_PORT=5432
          DATABASE_URL=postgresql+asyncpg://pybot:ci-parity-password@postgres:5432/pybot_parity
          FSM_STORAGE_BACKEND=redis
          REDIS_URL=redis://redis:6379/0
          TASKIQ_WORKERS=1
          NOTIFICATION_BACKEND=logging
          RUNTIME_ALERTS_ENABLED=false
          LOG_FORMAT=json
          HEALTH_API_ENABLED=true
          HEALTH_API_HOST=0.0.0.0
          HEALTH_API_PORT=8001
          EOF

      - name: Smoke-check local parity runtime
        run: bash scripts/ci/run_parity_smoke_check.sh

  cli-smoke-checks:
    name: CLI Smoke Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies (including dev-group)
        run: uv sync --dev

      - name: Smoke-check pybot-seed CLI help
        run: uv run pybot-seed --help

  quality-checks:
    name: Lint, Format Check, Type Check, Architecture Check & Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: pybot_test
          POSTGRES_USER: pybot
          POSTGRES_PASSWORD: ci-test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready --username pybot --dbname pybot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://pybot:ci-test-password@127.0.0.1:5432/pybot_test
      PYBOT_TEST_DATABASE_URL: postgresql+asyncpg://pybot:ci-test-password@127.0.0.1:5432/pybot_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install dependencies (including dev-group)
        run: just install-dev

      - name: Install ansible-core for playbook syntax checks
        run: python -m pip install --upgrade pip ansible-core

      - name: Run Ansible playbook syntax checks
        run: |
          cat > "$RUNNER_TEMP/ansible-syntax-check.ini" <<'EOF'
          [pybot]
          localhost ansible_connection=local
          EOF
          ansible-playbook ansible/playbooks/deploy.yml \
            -i "$RUNNER_TEMP/ansible-syntax-check.ini" \
            --syntax-check
          ansible-playbook ansible/playbooks/bootstrap.yml \
            -i "$RUNNER_TEMP/ansible-syntax-check.ini" \
            --syntax-check

      - name: Verify Alembic PostgreSQL migration cycle
        run: |
          uv run alembic upgrade head
          uv run alembic check
          uv run alembic downgrade base
          uv run alembic upgrade head

      - name: Run quality-gate (format check + lint + type check + arch check + tests)
        run: just quality-gate

      - name: Upload coverage.xml artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
