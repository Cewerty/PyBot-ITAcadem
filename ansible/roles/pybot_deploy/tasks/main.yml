- name: Validate required deploy variables
  ansible.builtin.assert:
    that:
      - deploy_path is defined
      - deploy_compose_src is defined
      - app_env_src is defined
      - image_repository is defined
      - image_tag is defined
    fail_msg: "deploy_path, deploy_compose_src, app_env_src, image_repository, and image_tag are required."

- name: Create application directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ deploy_path }}"
    - "{{ deploy_path }}/backups"

- name: Copy production compose file
  ansible.builtin.copy:
    src: "{{ deploy_compose_src }}"
    dest: "{{ deploy_path }}/docker-compose.prod.yml"
    mode: "0644"

- name: Copy production environment file
  ansible.builtin.copy:
    src: "{{ app_env_src }}"
    dest: "{{ deploy_path }}/.env"
    mode: "0600"

- name: Persist current APP_IMAGE in deploy environment file
  ansible.builtin.lineinfile:
    path: "{{ deploy_path }}/.env"
    regexp: "^APP_IMAGE="
    line: "APP_IMAGE={{ image_repository }}:{{ image_tag }}"
    create: true
    mode: "0600"

- name: Validate production SQLite path is volume-backed
  ansible.builtin.shell: |
    set -eu
    db_url="$(grep '^DATABASE_URL=' .env | cut -d= -f2- || true)"
    if [ -z "$db_url" ]; then
      exit 0
    fi
    case "$db_url" in
      sqlite+aiosqlite:///./data/*)
        exit 0
        ;;
      sqlite+aiosqlite:///*)
        echo "Production SQLite DATABASE_URL must point to ./data/... so migrations and runtime share the mounted volume." >&2
        exit 1
        ;;
      *)
        exit 0
        ;;
    esac
  args:
    chdir: "{{ deploy_path }}"
    executable: /bin/sh
  changed_when: false

- name: Log in to GHCR when deploy credentials are provided
  ansible.builtin.shell: |
    set -eu
    echo "{{ registry_token }}" | docker login ghcr.io --username "{{ registry_username }}" --password-stdin
  args:
    executable: /bin/sh
  no_log: true
  when:
    - registry_username is defined
    - registry_username | length > 0
    - registry_token is defined
    - registry_token | length > 0

- name: Back up SQLite database volume when present
  ansible.builtin.shell: |
    set -eu
    db_url="$(grep '^DATABASE_URL=' "{{ deploy_path }}/.env" | cut -d= -f2- || true)"
    case "$db_url" in
      sqlite+aiosqlite:///./data/*)
        db_path="${db_url#sqlite+aiosqlite:///./data/}"
        ;;
      *)
        exit 0
        ;;
    esac

    if docker volume inspect pybot_data_prod >/dev/null 2>&1; then
      docker run --rm \
        -v pybot_data_prod:/data \
        -v "{{ deploy_path }}/backups:/backup" \
        -e DB_PATH="$db_path" \
        alpine:3.20 \
        sh -eu -c '
          db_name="$(basename "$DB_PATH")"
          timestamp="$(date +%Y%m%d%H%M%S)"
          case "$db_name" in
            *.db) backup_name="${db_name%.db}-$timestamp.db" ;;
            *) backup_name="${db_name}-$timestamp.bak" ;;
          esac
          if [ -f "/data/$DB_PATH" ]; then
            cp "/data/$DB_PATH" "/backup/$backup_name"
          fi
        '
    fi
  args:
    executable: /bin/sh
  changed_when: false

- name: Pull production images
  ansible.builtin.shell: |
    set -eu
    docker compose -f docker-compose.prod.yml pull
  args:
    chdir: "{{ deploy_path }}"
    executable: /bin/sh
  environment:
    APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"

- name: Run one-shot database migrations
  ansible.builtin.shell: |
    set -eu
    docker compose -f docker-compose.prod.yml --profile migration run --rm migrate
  args:
    chdir: "{{ deploy_path }}"
    executable: /bin/sh
  environment:
    APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"

- name: Run one-shot seed step when explicitly requested
  ansible.builtin.shell: |
    set -eu
    docker compose -f docker-compose.prod.yml --profile seed run --rm seed
  args:
    chdir: "{{ deploy_path }}"
    executable: /bin/sh
  environment:
    APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"
  when: run_seed_on_deploy | default(false) | bool

- name: Read health API toggle for production compose profile
  ansible.builtin.shell: |
    set -eu
    value="$(grep '^HEALTH_API_ENABLED=' .env | cut -d= -f2- || true)"
    if [ -z "$value" ]; then
      echo "false"
    else
      printf '%s\n' "$value"
    fi
  args:
    chdir: "{{ deploy_path }}"
    executable: /bin/sh
  register: health_api_enabled_value
  changed_when: false

- name: Stop existing production compose before redeploy
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - -f
      - docker-compose.prod.yml
      - down
      - --remove-orphans
    chdir: "{{ deploy_path }}"
  environment:
    APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"
  register: compose_down_result
  failed_when: false
  changed_when: compose_down_result.rc == 0

- name: Apply production compose
  ansible.builtin.command:
    argv: "{{ base_cmd + health_args + tail_args }}"
    chdir: "{{ deploy_path }}"
  vars:
    base_cmd: ["docker", "compose", "-f", "docker-compose.prod.yml"]
    health_args: >-
      {{ ['--profile', 'health']
         if health_api_enabled_value.stdout | trim | lower in ['1', 'true', 'yes', 'on']
         else [] }}
    tail_args: ["up", "-d", "--remove-orphans"]
  environment:
    APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"

- name: Run post-deploy smoke checks
  block:
    - name: Read smoke-check health API toggle from deployed environment file
      ansible.builtin.shell: |
        set -eu
        value="$(grep '^HEALTH_API_ENABLED=' .env | cut -d= -f2- || true)"
        if [ -z "$value" ]; then
          echo "false"
        else
          printf '%s\n' "$value"
        fi
      args:
        chdir: "{{ deploy_path }}"
        executable: /bin/sh
      register: health_api_enabled_value
      changed_when: false

    - name: Read smoke-check Nginx bind host from deployed environment file
      ansible.builtin.shell: |
        set -eu
        value="$(grep '^NGINX_BIND_HOST=' .env | cut -d= -f2- || true)"
        if [ -z "$value" ]; then
          echo "127.0.0.1"
        else
          printf '%s\n' "$value"
        fi
      args:
        chdir: "{{ deploy_path }}"
        executable: /bin/sh
      register: nginx_bind_host_value
      changed_when: false

    - name: Read smoke-check Nginx port from deployed environment file
      ansible.builtin.shell: |
        set -eu
        value="$(grep '^NGINX_PORT=' .env | cut -d= -f2- || true)"
        if [ -z "$value" ]; then
          echo "8088"
        else
          printf '%s\n' "$value"
        fi
      args:
        chdir: "{{ deploy_path }}"
        executable: /bin/sh
      register: nginx_port_value
      changed_when: false

    - name: Show compose status after deploy
      ansible.builtin.command:
        cmd: docker compose -f docker-compose.prod.yml ps
        chdir: "{{ deploy_path }}"
      environment:
        APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"
      changed_when: false

    - name: Wait for core production services to appear in compose ps
      ansible.builtin.command:
        cmd: docker compose -f docker-compose.prod.yml ps
        chdir: "{{ deploy_path }}"
      register: compose_ps_result
      retries: 10
      delay: 3
      until: >
        compose_ps_result.rc == 0 and
        ('bot' in compose_ps_result.stdout) and
        ('taskiq-worker' in compose_ps_result.stdout) and
        ('taskiq-scheduler' in compose_ps_result.stdout) and
        ('redis' in compose_ps_result.stdout)
      changed_when: false
      environment:
        APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"

    - name: Wait for Redis healthcheck to report healthy
      ansible.builtin.shell: |
        set -eu
        cid="$(docker compose -f docker-compose.prod.yml ps -q redis)"
        [ -n "$cid" ]
        health="$(docker inspect -f '{{ "{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}" }}' "$cid")"
        [ "$health" = "healthy" ] || [ "$health" = "none" ]
      args:
        chdir: "{{ deploy_path }}"
        executable: /bin/sh
      retries: 10
      delay: 3
      changed_when: false

    - name: Wait for health service to appear in compose ps
      ansible.builtin.command:
        cmd: docker compose -f docker-compose.prod.yml ps
        chdir: "{{ deploy_path }}"
      register: health_compose_ps_result
      retries: 10
      delay: 3
      until: >
        health_compose_ps_result.rc == 0 and
        ('health' in health_compose_ps_result.stdout)
      changed_when: false
      environment:
        APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"
      when: health_api_enabled_value.stdout | trim | lower in ['1', 'true', 'yes', 'on']

    - name: Probe readiness endpoint until it returns 200
      ansible.builtin.uri:
        url: >-
          http://{{ nginx_bind_host_value.stdout | trim }}:{{ nginx_port_value.stdout | trim }}/health/ready
        method: GET
        status_code:
          - 200
          - 503
        return_content: true
        timeout: 5
      register: readiness_probe_result
      retries: 20
      delay: 3
      until: >
        readiness_probe_result is not failed and
        readiness_probe_result.status == 200
      failed_when: false
      changed_when: false
      when: health_api_enabled_value.stdout | trim | lower in ['1', 'true', 'yes', 'on']
