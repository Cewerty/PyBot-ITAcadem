- name: Validate required deploy variables
  ansible.builtin.assert:
    that:
      - deploy_path is defined
      - deploy_compose_src is defined
      - app_env_src is defined
      - image_repository is defined
      - image_tag is defined
      - rollback_mode is defined
      - run_migrations is defined
    fail_msg: "deploy_path, deploy_compose_src, app_env_src, image_repository, image_tag, rollback_mode, and run_migrations are required."

- name: Create application directory
  ansible.builtin.file:
    path: "{{ deploy_path }}"
    state: directory
    mode: "0755"

- name: Copy production compose file
  ansible.builtin.copy:
    src: "{{ deploy_compose_src }}"
    dest: "{{ deploy_path }}/docker-compose.prod.yml"
    mode: "0644"

- name: Copy production environment file
  ansible.builtin.copy:
    src: "{{ app_env_src }}"
    dest: "{{ deploy_path }}/.env"
    mode: "0600"

- name: Persist current APP_IMAGE in deploy environment file
  ansible.builtin.lineinfile:
    path: "{{ deploy_path }}/.env"
    regexp: "^APP_IMAGE="
    line: "APP_IMAGE={{ image_repository }}:{{ image_tag }}"
    create: true
    mode: "0600"

- name: Validate production PostgreSQL environment contract
  ansible.builtin.shell: |
    set -eu
    python3 - <<'PY'
    from pathlib import Path
    from typing import Dict
    from urllib.parse import unquote, urlsplit

    REQUIRED_KEYS = (
        "POSTGRES_DB",
        "POSTGRES_USER",
        "POSTGRES_PASSWORD",
        "DATABASE_URL",
    )


    def fail(message: str) -> None:
        raise SystemExit(f"Invalid production database configuration: {message}")


    def parse_env(path: Path) -> Dict[str, str]:
        values: Dict[str, str] = {}
        for raw_line in path.read_text(encoding="utf-8").splitlines():
            line = raw_line.strip()
            if not line or line.startswith("#") or "=" not in line:
                continue
            key, value = line.split("=", 1)
            key = key.strip()
            value = value.strip()
            if (
                len(value) >= 2
                and value[0] == value[-1]
                and value[0] in {"'", '"'}
            ):
                value = value[1:-1]
            values[key] = value
        return values


    try:
        env = parse_env(Path(".env"))
        missing_keys = [key for key in REQUIRED_KEYS if not env.get(key)]
        if missing_keys:
            fail("missing required variables: " + ", ".join(missing_keys))

        database_url = urlsplit(env["DATABASE_URL"])
        if database_url.scheme != "postgresql+asyncpg":
            fail("DATABASE_URL must use the postgresql+asyncpg scheme")
        if database_url.hostname != "postgres":
            fail("DATABASE_URL hostname must be postgres")
        if unquote(database_url.username or "") != env["POSTGRES_USER"]:
            fail("DATABASE_URL user does not match POSTGRES_USER")
        if unquote(database_url.password or "") != env["POSTGRES_PASSWORD"]:
            fail("DATABASE_URL password does not match POSTGRES_PASSWORD")
        database_name = database_url.path[1:] if database_url.path.startswith("/") else ""
        if unquote(database_name) != env["POSTGRES_DB"]:
            fail("DATABASE_URL database does not match POSTGRES_DB")
    except SystemExit:
        raise
    except Exception:
        fail("unable to parse .env or DATABASE_URL")
    PY
  args:
    chdir: "{{ deploy_path }}"
    executable: /bin/sh
  changed_when: false

- name: Log in to GHCR when deploy credentials are provided
  ansible.builtin.shell: |
    set -eu
    echo "{{ registry_token }}" | docker login ghcr.io --username "{{ registry_username }}" --password-stdin
  args:
    executable: /bin/sh
  no_log: true
  when:
    - registry_username is defined
    - registry_username | length > 0
    - registry_token is defined
    - registry_token | length > 0

- name: Pull production images
  ansible.builtin.shell: |
    set -eu
    docker compose -f docker-compose.prod.yml \
      --profile validation \
      --profile backup \
      --profile restore \
      --profile migration \
      --profile seed \
      --profile health \
      pull
  args:
    chdir: "{{ deploy_path }}"
    executable: /bin/sh
  environment:
    APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"

- name: Validate runtime configuration before starting deploy dependencies
  ansible.builtin.shell: |
    set -eu
    docker compose -f docker-compose.prod.yml --profile validation run --rm --no-deps config-check
  args:
    chdir: "{{ deploy_path }}"
    executable: /bin/sh
  environment:
    APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"

- name: Start PostgreSQL
  ansible.builtin.command:
    cmd: docker compose -f docker-compose.prod.yml up -d postgres
    chdir: "{{ deploy_path }}"
  environment:
    APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"

- name: Wait for PostgreSQL healthcheck before admin processes
  ansible.builtin.shell: |
    set -eu
    cid="$(docker compose -f docker-compose.prod.yml ps -q postgres)"
    [ -n "$cid" ]
    health="$(docker inspect -f '{{ "{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}" }}' "$cid")"
    [ "$health" = "healthy" ]
  args:
    chdir: "{{ deploy_path }}"
    executable: /bin/sh
  register: postgres_pre_migration_health
  retries: 20
  delay: 3
  until: postgres_pre_migration_health.rc == 0
  changed_when: false
  environment:
    APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"

- name: Back up PostgreSQL before migrations
  ansible.builtin.shell: |
    set -eu
    docker compose -f docker-compose.prod.yml --profile backup run --rm backup
  args:
    chdir: "{{ deploy_path }}"
    executable: /bin/sh
  environment:
    APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"

- name: Run one-shot database migrations
  ansible.builtin.shell: |
    set -eu
    docker compose -f docker-compose.prod.yml --profile migration run --rm migrate
  args:
    chdir: "{{ deploy_path }}"
    executable: /bin/sh
  environment:
    APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"
  when: run_migrations | bool

- name: Run one-shot seed step when explicitly requested
  ansible.builtin.shell: |
    set -eu
    docker compose -f docker-compose.prod.yml --profile seed run --rm \
      seed pybot-seed --skip-fake-users
  args:
    chdir: "{{ deploy_path }}"
    executable: /bin/sh
  environment:
    APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"
  when:
    - run_seed_on_deploy | default(false) | bool
    - not rollback_mode | bool

- name: Read health API toggle for production compose profile
  ansible.builtin.shell: |
    set -eu
    value="$(grep '^HEALTH_API_ENABLED=' .env | cut -d= -f2- || true)"
    if [ -z "$value" ]; then
      echo "false"
    else
      printf '%s\n' "$value"
    fi
  args:
    chdir: "{{ deploy_path }}"
    executable: /bin/sh
  register: health_api_enabled_value
  changed_when: false

- name: Apply production compose
  ansible.builtin.command:
    argv: "{{ base_cmd + health_args + tail_args }}"
    chdir: "{{ deploy_path }}"
  vars:
    base_cmd: ["docker", "compose", "-f", "docker-compose.prod.yml"]
    health_args: >-
      {{ ['--profile', 'health']
         if health_api_enabled_value.stdout | trim | lower in ['1', 'true', 'yes', 'on']
         else [] }}
    tail_args: ["up", "-d", "--remove-orphans"]
  environment:
    APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"

- name: Run post-deploy smoke checks
  block:
    - name: Read smoke-check health API toggle from deployed environment file
      ansible.builtin.shell: |
        set -eu
        value="$(grep '^HEALTH_API_ENABLED=' .env | cut -d= -f2- || true)"
        if [ -z "$value" ]; then
          echo "false"
        else
          printf '%s\n' "$value"
        fi
      args:
        chdir: "{{ deploy_path }}"
        executable: /bin/sh
      register: health_api_enabled_value
      changed_when: false

    - name: Read smoke-check Nginx bind host from deployed environment file
      ansible.builtin.shell: |
        set -eu
        value="$(grep '^NGINX_BIND_HOST=' .env | cut -d= -f2- || true)"
        if [ -z "$value" ]; then
          echo "127.0.0.1"
        else
          printf '%s\n' "$value"
        fi
      args:
        chdir: "{{ deploy_path }}"
        executable: /bin/sh
      register: nginx_bind_host_value
      changed_when: false

    - name: Read smoke-check Nginx port from deployed environment file
      ansible.builtin.shell: |
        set -eu
        value="$(grep '^NGINX_PORT=' .env | cut -d= -f2- || true)"
        if [ -z "$value" ]; then
          echo "8088"
        else
          printf '%s\n' "$value"
        fi
      args:
        chdir: "{{ deploy_path }}"
        executable: /bin/sh
      register: nginx_port_value
      changed_when: false

    - name: Show compose status after deploy
      ansible.builtin.command:
        cmd: docker compose -f docker-compose.prod.yml ps
        chdir: "{{ deploy_path }}"
      environment:
        APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"
      changed_when: false

    - name: Wait for core production services to appear in compose ps
      ansible.builtin.command:
        cmd: docker compose -f docker-compose.prod.yml ps
        chdir: "{{ deploy_path }}"
      register: compose_ps_result
      retries: 10
      delay: 3
      until: >
        compose_ps_result.rc == 0 and
        ('bot' in compose_ps_result.stdout) and
        ('taskiq-worker' in compose_ps_result.stdout) and
        ('taskiq-scheduler' in compose_ps_result.stdout) and
        ('postgres' in compose_ps_result.stdout) and
        ('redis' in compose_ps_result.stdout)
      changed_when: false
      environment:
        APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"

    - name: Wait for PostgreSQL and Redis healthchecks to report healthy
      ansible.builtin.shell: |
        set -eu
        for service in postgres redis; do
          cid="$(docker compose -f docker-compose.prod.yml ps -q "$service")"
          [ -n "$cid" ]
          health="$(docker inspect -f '{{ "{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}" }}' "$cid")"
          [ "$health" = "healthy" ]
        done
      args:
        chdir: "{{ deploy_path }}"
        executable: /bin/sh
      register: database_and_cache_health
      retries: 20
      delay: 3
      until: database_and_cache_health.rc == 0
      changed_when: false
      environment:
        APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"

    - name: Capture runtime service stability baseline
      ansible.builtin.shell: |
        set -eu
        for service in bot taskiq-worker taskiq-scheduler; do
          cid="$(docker compose -f docker-compose.prod.yml ps -q "$service")"
          [ -n "$cid" ]
          status="$(docker inspect -f '{{ "{{.State.Status}}" }}' "$cid")"
          restart_count="$(docker inspect -f '{{ "{{.RestartCount}}" }}' "$cid")"
          [ "$status" = "running" ]
          printf '%s\t%s\t%s\t%s\n' "$service" "$cid" "$status" "$restart_count"
        done
      args:
        chdir: "{{ deploy_path }}"
        executable: /bin/sh
      register: runtime_service_stability_baseline
      changed_when: false
      environment:
        APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"

    - name: Wait for runtime stability observation window
      ansible.builtin.pause:
        seconds: 20

    - name: Verify runtime services remain stable through observation window
      ansible.builtin.shell: |
        set -eu
        while IFS="$(printf '\t')" read -r service baseline_cid baseline_status baseline_restart_count; do
          [ -n "$service" ] || continue
          if [ "$baseline_status" != "running" ]; then
            echo "Runtime stability baseline for $service was not running: status=$baseline_status" >&2
            exit 1
          fi

          current_cid="$(docker compose -f docker-compose.prod.yml ps -q "$service")"
          if [ -z "$current_cid" ]; then
            echo "Runtime stability check failed for $service: service no longer resolves to a container id after the 20-second observation window." >&2
            docker compose -f docker-compose.prod.yml ps "$service" >&2 || true
            exit 1
          fi
          if [ "$current_cid" != "$baseline_cid" ]; then
            echo "Runtime stability check failed for $service: container changed during the 20-second observation window (baseline=$baseline_cid current=$current_cid)." >&2
            docker compose -f docker-compose.prod.yml ps "$service" >&2 || true
            exit 1
          fi

          current_status="$(docker inspect -f '{{ "{{.State.Status}}" }}' "$current_cid")"
          if [ "$current_status" != "running" ]; then
            echo "Runtime stability check failed for $service: current status is $current_status instead of running." >&2
            docker compose -f docker-compose.prod.yml ps "$service" >&2 || true
            exit 1
          fi

          current_restart_count="$(docker inspect -f '{{ "{{.RestartCount}}" }}' "$current_cid")"
          if [ "$current_restart_count" -ne "$baseline_restart_count" ]; then
            echo "Runtime stability check failed for $service: RestartCount increased during the 20-second observation window (baseline=$baseline_restart_count current=$current_restart_count)." >&2
            docker compose -f docker-compose.prod.yml ps "$service" >&2 || true
            exit 1
          fi
        done
      args:
        chdir: "{{ deploy_path }}"
        executable: /bin/sh
        stdin: "{{ runtime_service_stability_baseline.stdout }}"
      changed_when: false
      environment:
        APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"

    - name: Wait for health service to appear in compose ps
      ansible.builtin.command:
        cmd: docker compose -f docker-compose.prod.yml ps
        chdir: "{{ deploy_path }}"
      register: health_compose_ps_result
      retries: 10
      delay: 3
      until: >
        health_compose_ps_result.rc == 0 and
        ('health' in health_compose_ps_result.stdout)
      changed_when: false
      environment:
        APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"
      when: health_api_enabled_value.stdout | trim | lower in ['1', 'true', 'yes', 'on']

    - name: Probe readiness endpoint until it returns 200
      ansible.builtin.uri:
        url: >-
          http://{{ nginx_bind_host_value.stdout | trim }}:{{ nginx_port_value.stdout | trim }}/health/ready
        method: GET
        status_code:
          - 200
          - 503
        return_content: true
        timeout: 5
      register: readiness_probe_result
      retries: 20
      delay: 3
      until: >
        readiness_probe_result is not failed and
        readiness_probe_result.status == 200
      failed_when: false
      changed_when: false
      when: health_api_enabled_value.stdout | trim | lower in ['1', 'true', 'yes', 'on']
