x-app-base: &app-base
  image: ${APP_IMAGE:?APP_IMAGE must be set for production deploys}
  init: true
  env_file:
    - .env
  environment:
    DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./data/pybot_itacadem.db}
    AUTO_SEED_DB: ${AUTO_SEED_DB:-false}
    TELEGRAM_PROXY_URL: ${TELEGRAM_PROXY_URL:-}
    FSM_STORAGE_BACKEND: ${FSM_STORAGE_BACKEND:-redis}
    REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  volumes:
    - pybot_data:/app/data
  logging:
    driver: json-file
    options:
      max-size: "5m"
      max-file: "3"

x-app-service: &app-service
  <<: *app-base
  restart: unless-stopped
  depends_on:
    redis:
      condition: service_healthy

services:
  bot:
    <<: *app-service
    container_name: pybot-bot
    command: ["sh", "-c", "HEALTH_API_ENABLED=false exec python run.py"]

  health:
    <<: *app-base
    container_name: pybot-health
    profiles: ["health"]
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command:
      [
        "uvicorn",
        "src.pybot.presentation.web:app",
        "--host",
        "${HEALTH_API_HOST:-0.0.0.0}",
        "--port",
        "${HEALTH_API_PORT:-8001}",
        "--root-path",
        "/health",
      ]

  taskiq-worker:
    <<: *app-service
    container_name: pybot-taskiq-worker
    command:
      [
        "sh",
        "-c",
        "TASKIQ_WORKERS='${TASKIQ_WORKERS:-1}'; if [ \"$TASKIQ_WORKERS\" != \"1\" ]; then echo \"TASKIQ_WORKERS=$TASKIQ_WORKERS is not supported yet; only TASKIQ_WORKERS=1 is allowed until the runtime is ready for multi-instance workers.\" >&2; exit 1; fi; exec taskiq worker src.pybot.infrastructure.taskiq.entrypoint:broker --workers \"$TASKIQ_WORKERS\"",
      ]

  taskiq-scheduler:
    <<: *app-service
    container_name: pybot-taskiq-scheduler
    command:
      [
        "taskiq",
        "scheduler",
        "src.pybot.infrastructure.taskiq.entrypoint:scheduler",
        "--skip-first-run",
      ]

  migrate:
    <<: *app-base
    container_name: pybot-migrate
    profiles: ["migration"]
    restart: "no"
    command: ["alembic", "upgrade", "head"]

  seed:
    <<: *app-base
    container_name: pybot-seed
    profiles: ["seed"]
    restart: "no"
    command: ["pybot-seed"]

  redis:
    image: redis:7-alpine
    container_name: pybot-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:3.5.0
    container_name: pybot-loki
    restart: unless-stopped
    volumes:
      - loki_data:/loki
      - ./observability/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  alloy:
    image: grafana/alloy:v1.6.1
    container_name: pybot-alloy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    depends_on:
      - loki
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  grafana:
    image: grafana/grafana:11.5.2
    container_name: pybot-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      # TODO: Replace 'localhost' with the real domain name when one is configured.
      # Currently routes Grafana sub-path correctly for IP-only access.
      # When a domain is added, update to: http://your-domain.com/grafana/
      - GF_SERVER_DOMAIN=${PUBLIC_DOMAIN:-localhost}
      - GF_SERVER_ROOT_URL=http://${PUBLIC_DOMAIN:-localhost}:${NGINX_PORT:-8080}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: pybot-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./observability/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - grafana
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  pybot_data:
    name: pybot_data_prod
  redis_data:
    name: pybot_redis_data_prod
  loki_data:
    name: pybot_loki_data_prod
  grafana_data:
    name: pybot_grafana_data_prod
